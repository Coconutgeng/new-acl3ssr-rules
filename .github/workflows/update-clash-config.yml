name: Update Clash Config (No Region Groups + Bilibili Node Select)

on:
  schedule:
    # 每3天运行一次 (UTC 02:00)
    - cron: '0 2 */3 * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  update-config:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download ACL4SSR_Online_Full_AdblockPlus
        run: |
          curl -L -o /tmp/ACL4SSR_Online_Full_AdblockPlus.ini \
            "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Full_AdblockPlus.ini"

      - name: Remove region groups and add Bilibili node select
        run: |
          python3 << 'PYEOF'
          import re

          input_file = "/tmp/ACL4SSR_Online_Full_AdblockPlus.ini"
          output_file = "ACL4SSR_Online_Full_NoRegion.ini"

          with open(input_file, "r", encoding="utf-8") as f:
              lines = f.readlines()

          # 1. 地区分组定义行（需要完全删除的行）
          region_group_defs = [
              r"^custom_proxy_group=🇭🇰 香港节点.*",
              r"^custom_proxy_group=🇯🇵 日本节点.*",
              r"^custom_proxy_group=🇺🇲 美国节点.*",
              r"^custom_proxy_group=🇨🇳 台湾节点.*",
              r"^custom_proxy_group=🇸🇬 狮城节点.*",
              r"^custom_proxy_group=🇰🇷 韩国节点.*",
              r"^custom_proxy_group=🎥 奈飞节点.*",
          ]

          # 2. 地区引用（需要移除的部分）
          # 格式为 `[]🇭🇰 香港节点`（前面有反引号分隔符）
          region_refs = [
              r"`\[\]🇭🇰 香港节点",
              r"`\[\]🇨🇳 台湾节点",
              r"`\[\]🇸🇬 狮城节点",
              r"`\[\]🇯🇵 日本节点",
              r"`\[\]🇺🇲 美国节点",
              r"`\[\]🇰🇷 韩国节点",
              r"`\[\]🎥 奈飞节点",
          ]

          result_lines = []

          for line in lines:
              # 跳过地区分组定义行
              skip = False
              for pattern in region_group_defs:
                  if re.match(pattern, line):
                      skip = True
                      break
              if skip:
                  continue
              
              # 在哔哩哔哩行添加节点选择选项
              if line.startswith("custom_proxy_group=📺 哔哩哔哩"):
                  # 原格式: custom_proxy_group=📺 哔哩哔哩`select`[]🎯 全球直连`[]🇨🇳 台湾节点`[]🇭🇰 香港节点
                  # 新格式: custom_proxy_group=📺 哔哩哔哩`select`[]🎯 全球直连`[]🚀 节点选择`[]🇨🇳 台湾节点`[]🇭🇰 香港节点
                  line = line.replace(
                      "`select`[]🎯 全球直连",
                      "`select`[]🎯 全球直连`[]🚀 节点选择"
                  )
              
              # 移除地区引用（包括前面的反引号分隔符）
              cleaned = line
              for ref in region_refs:
                  cleaned = re.sub(ref, "", cleaned)
              
              result_lines.append(cleaned)

          with open(output_file, "w", encoding="utf-8") as f:
              f.writelines(result_lines)

          print(f"✅ 处理完成，已保存到 {output_file}")

          # 验证：检查是否还有地区分组残留
          remaining = []
          for i, line in enumerate(result_lines, 1):
              if any(kw in line for kw in ['🇭🇰', '🇨🇳', '🇸🇬', '🇯🇵', '🇺🇲', '🇰🇷', '🎥 奈飞节点']):
                  remaining.append((i, line))

          if remaining:
              print(f"⚠️ 发现 {len(remaining)} 处地区分组残留：")
              for line_num, content in remaining:
                  print(f"  第 {line_num} 行: {content.strip()}")
              exit(1)
          else:
              print("✅ 所有地区分组及引用已完全清除！")

          # 验证哔哩哔哩行
          for i, line in enumerate(result_lines, 1):
              if line.startswith("custom_proxy_group=📺 哔哩哔哩"):
                  if "[]🚀 节点选择" in line:
                      print(f"✅ 哔哩哔哩行已添加节点选择选项")
                      print(f"  第 {i} 行: {line.strip()}")
                  else:
                      print(f"⚠️ 哔哩哔哩行未找到节点选择选项")
                      print(f"  第 {i} 行: {line.strip()}")
                      exit(1)
                  break
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ACL4SSR_Online_Full_NoRegion.ini
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update ACL4SSR config: remove region groups + add Bilibili node select [$(date -u +%Y-%m-%d)]"
            git push
          fi
